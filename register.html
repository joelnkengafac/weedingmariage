<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <style>
        :root {
            font-family: Arial, sans-serif;
            color: #333;
            background: #f7f5f2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdf2f2 0%, #f7f5f2 100%);
        }

        .container {
            width: min(520px, 100%);
            margin: 24px;
            padding: 32px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(82, 63, 105, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }

        p.lead {
            margin: 0 0 26px;
            color: #666;
            line-height: 1.6;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d9d5d0;
            border-radius: 12px;
            background: #faf9f7;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: #8860f0;
            box-shadow: 0 0 0 4px rgba(136, 96, 240, 0.12);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: #6f5af9;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            background: #5a43e1;
        }

        .message {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.success {
            display: block;
            background: #e9f9ee;
            color: #166c3a;
            border: 1px solid #9ce0b2;
        }

        .message.error {
            display: block;
            background: #fff0f0;
            color: #9f2b2b;
            border: 1px solid #f4c3c3;
        }

        .bottom-link {
            margin-top: 22px;
            font-size: 0.95rem;
            color: #666;
            text-align: center;
        }

        .bottom-link a {
            color: #6f5af9;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Inscription</h1>
            <p class="lead">Créez votre compte pour rejoindre l'organisation du mariage et gérer les invitations.</p>
        </header>

        <form id="registerForm" novalidate>
            <div class="field">
                <label for="fullName">Nom complet</label>
                <input id="fullName" name="fullName" type="text" required minlength="3" placeholder="Jean Dupont">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="exemple@mail.com">
            </div>

            <div class="field">
                <label for="phone">Téléphone</label>
                <input id="phone" name="phone" type="tel" pattern="^[0-9 +()\-]{8,20}$" placeholder="+33 6 12 34 56 78">
            </div>

            <div class="field">
                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" required minlength="6" placeholder="••••••••">
            </div>

            <div class="field">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6" placeholder="••••••••">
            </div>

            <div class="field">
                <label for="role">Vous êtes</label>
                <select id="role" name="role" required>
                    <option value="">Sélectionnez votre rôle</option>
                    <option value="invite">Invité</option>
                    <option value="famille">Famille</option>
                    <option value="organisateur">Organisateur</option>
                </select>
            </div>

            <button type="submit">S'inscrire</button>
            <div id="message" class="message" aria-live="polite"></div>
        </form>

        <p class="bottom-link">Déjà inscrit ? <a href="index.html">Retour à l'accueil</a></p>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const message = document.getElementById('message');

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            message.className = 'message';

            const fullName = form.fullName.value.trim();
            const email = form.email.value.trim();
            const password = form.password.value;
            const confirmPassword = form.confirmPassword.value;
            const role = form.role.value;

            if (!fullName || !email || !password || !confirmPassword || !role) {
                showMessage('Veuillez remplir tous les champs obligatoires.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas.', 'error');
                return;
            }

            if (!form.checkValidity()) {
                showMessage('Veuillez vérifier les informations saisies.', 'error');
                return;
            }

            showMessage('Inscription réussie ! Un e-mail de confirmation vous sera envoyé.', 'success');
            form.reset();
        });
    </script>
</body>
</html>
