<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .login-container{
            width:350px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-container h2{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#555;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#4facfe;
            box-shadow:0 0 8px rgba(79,172,254,0.4);
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#0099ff;
        }

        .extra-links{
            margin-top:15px;
            text-align:center;
        }

        .extra-links a{
            text-decoration:none;
            color:#4facfe;
            font-size:14px;
        }

        .extra-links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Connexion</h2>

        <form action="" method="POST">

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Entrez votre email" required>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="Entrez votre mot de passe" required>
            </div>

            <button type="submit" class="btn-login">
                Se connecter
            </button>

            <div class="extra-links">
                <p><a href="#">Mot de passe oublié ?</a></p>
                <p><a href="#">Créer un compte</a></p>
            </div>

        </form>
    </div>

</body>
</html>
