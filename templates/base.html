{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Jocelyne & Prosper | Invitation de Mariage{% endblock %}</title>

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- TAILWIND CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background: #050B18;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .title-font{
            font-family: 'Great Vibes', cursive;
        }

        .hero-overlay{
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,.4),
                rgba(0,0,0,.7)
            );
        }

        .glass{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gold-text{
            color: #D4AF37;
        }

        .gold-border{
            border-color: #D4AF37;
        }

        .btn-gold{
            background: #D4AF37;
            color: #050B18;
            transition: .4s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-gold:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212,175,55,.5);
        }

        .section-shell{
            padding: 6rem 1.5rem;
        }

        .section-title{
            font-family: 'Playfair Display', serif;
            letter-spacing: .02em;
        }

        .page-hero{
            min-height: 46vh;
            padding-top: 7rem;
        }

        .soft-panel{
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 8px;
        }

        .focus-ring:focus{
            outline: 2px solid #D4AF37;
            outline-offset: 3px;
        }

        .nav-link.active{
            color: #D4AF37;
        }

        .btn-gold.nav-link.active{
            color: #050B18;
            box-shadow: 0 0 0 2px rgba(255,255,255,.25);
        }

        .mobile-menu{
            max-height: 0;
            overflow: hidden;
            transition: max-height .35s ease;
        }

        .mobile-menu.open{
            max-height: 28rem;
        }

        .input-field{
            width: 100%;
            border-radius: .375rem;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            padding: .75rem 1rem;
            outline: none;
        }

        .input-field:focus{
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,.15);
        }

        .toast{
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 60;
            transform: translateY(1rem);
            opacity: 0;
            pointer-events: none;
            transition: .3s ease;
        }

        .toast.show{
            transform: translateY(0);
            opacity: 1;
        }

        .floating{
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating{
            0%{
                transform: translateY(0px);
            }
            50%{
                transform: translateY(-15px);
            }
            100%{
                transform: translateY(0px);
            }
        }

    </style>
</head>

<body class="text-white">

    {% include 'partials/navbar.html' %}

    {% block content %}
    {% endblock %}

    {% include 'partials/footer.html' %}

    <div id="site-toast" class="toast soft-panel px-5 py-4 text-sm text-white/85"></div>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1200,
            once: true
        });
    </script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/countdown.js' %}"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
