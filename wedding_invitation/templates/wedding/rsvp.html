<form class="soft-panel p-6 md:p-8 space-y-5" method="post">
    {% csrf_token %}

    <div class="flex items-start gap-4 rounded-lg bg-[#D4AF37]/10 border border-[#D4AF37]/25 p-4">
        <div class="h-9 w-9 rounded-full bg-[#D4AF37] text-[#050B18] flex items-center justify-center font-semibold">1</div>
        <div>
            <h2 class="font-semibold">Confirmation rapide</h2>
            <p class="text-sm text-white/65 mt-1">Remplissez ce formulaire pour aider les familles à organiser les places et le repas.</p>
        </div>
    </div>

    {% if messages %}
    <div class="rounded-lg bg-green-500/15 border border-green-400/30 p-4">
        {% for message in messages %}
        <p class="text-green-300 text-sm">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="grid gap-5 md:grid-cols-2">
        <label class="block">
            <span class="text-sm text-white/70">{{ form.name.label }}</span>
            {{ form.name }}
            {% if form.name.errors %}
            <p class="text-red-400 text-xs mt-1">{{ form.name.errors|join:", " }}</p>
            {% endif %}
        </label>
        <label class="block">
            <span class="text-sm text-white/70">{{ form.phone.label }}</span>
            {{ form.phone }}
        </label>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
        <label class="block">
            <span class="text-sm text-white/70">{{ form.attendance.label }}</span>
            {{ form.attendance }}
            {% if form.attendance.errors %}
            <p class="text-red-400 text-xs mt-1">{{ form.attendance.errors|join:", " }}</p>
            {% endif %}
        </label>
        <label class="block">
            <span class="text-sm text-white/70">{{ form.guests.label }}</span>
            {{ form.guests }}
        </label>
    </div>

    <label class="block">
        <span class="text-sm text-white/70">{{ form.message.label }}</span>
        {{ form.message }}
    </label>

    <button type="submit" class="btn-gold w-full md:w-auto px-9 py-4 rounded-full font-semibold tracking-wider">
        Envoyer ma réponse
    </button>
</form>
