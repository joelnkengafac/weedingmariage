{% extends 'base.html' %}

{% block title %}Livre d'or | Jocelyne & Prosper{% endblock %}

{% block content %}
<section class="page-hero section-shell bg-[#071120] text-center">
    <p class="uppercase tracking-[6px] text-xs text-white/50 mb-4">Livre d'or</p>
    <h1 class="section-title text-5xl md:text-6xl gold-text mb-6">Vos mots pour nous</h1>
    <p class="max-w-3xl mx-auto text-white/75 leading-8">
        Laissez un message de bénédiction, un souvenir ou un conseil pour notre nouvelle vie.
    </p>
</section>

<section class="section-shell">
    <div class="max-w-3xl mx-auto">
        <form class="soft-panel p-6 md:p-8 space-y-5" method="get">
            <label class="block">
                <span class="text-sm text-white/70">Votre nom</span>
                <input name="name" type="text" required placeholder="Votre nom" class="mt-2 input-field">
            </label>
            <label class="block">
                <span class="text-sm text-white/70">Votre message</span>
                <textarea name="message" rows="5" required placeholder="Votre message pour Jocelyne et Prosper" class="mt-2 input-field"></textarea>
            </label>
            <button type="submit" class="btn-gold w-full md:w-auto px-9 py-4 rounded-full font-semibold tracking-wider">
                Publier
            </button>
        </form>
    </div>
</section>
{% endblock %}
